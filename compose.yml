services:

  # ── FastAPI app ─────────────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:pass@db:5432/mydb
      # model-runner.docker.internal resolves to the Docker Desktop Model Runner
      LLM_BASE_URL: http://model-runner.docker.internal:12434/engines/llama.cpp/v1
      LLM_MODEL: ai/llama3.2
      EMBED_MODEL: ai/mxbai-embed-large
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── pgvector database ───────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: mydb
    volumes:
      - db_data:/var/lib/postgresql/data
      # init.sql runs once on first start to create the vector schema
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MCP Postgres server ─────────────────────────────────────────────────────
  # Gives AI agents a clean, isolated interface to the database.
  # Stop this container to revoke agent access — no host changes needed.
  mcp-postgres:
    image: mcp/postgres
    environment:
      POSTGRES_CONNECTION_STRING: postgresql://user:pass@db:5432/mydb
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
