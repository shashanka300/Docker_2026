services:

  # ── FastAPI app ─────────────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:pass@db:5432/mydb
      # Ollama runs as a sibling container — reachable by service name
      LLM_BASE_URL: http://ollama:11434/v1
      LLM_MODEL: llama3.2
      EMBED_MODEL: mxbai-embed-large
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ── pgvector database ───────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: mydb
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Ollama — local LLM server (OpenAI-compatible API) ──────────────────────
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      start_period: 15s
      retries: 8
    restart: unless-stopped

  # ── MCP Postgres server ─────────────────────────────────────────────────────
  # NOTE: mcp/postgres is distributed via Docker Desktop (requires login).
  # To enable: docker login, then uncomment this block.
  #
  # mcp-postgres:
  #   image: mcp/postgres
  #   environment:
  #     POSTGRES_CONNECTION_STRING: postgresql://user:pass@db:5432/mydb
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   restart: unless-stopped

volumes:
  db_data:
  ollama_data:
